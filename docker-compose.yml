# POS stack: PostgreSQL 17 + API + frontend (Vite build + nginx)
# Copy .env.example to .env and adjust secrets before first run.

name: pos-stack

services:
  db:
    image: postgres:17-alpine
    container_name: pos-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pos_change_me}
      POSTGRES_DB: ${POSTGRES_DB:-pos_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Dump must NOT use .sql suffix here (image auto-runs *.sql before scripts order may conflict)
      - ./DB.sql:/docker-entrypoint-initdb.d/seed/DB.sql:ro
      - ./docker/postgres/restore.sh:/docker-entrypoint-initdb.d/restore.sh:ro
    # Compose expands ${...} on the host — avoids $$ shell issues on some Docker builds.
    # Long start_period: first boot runs restore.sh (large DB.sql can take minutes).
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U \"${POSTGRES_USER:-postgres}\" -d \"${POSTGRES_DB:-pos_db}\"",
        ]
      interval: 10s
      timeout: 10s
      retries: 36
      start_period: 300s

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pos-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-3000}:3000"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-pos_change_me}
      DB_NAME: ${POSTGRES_DB:-pos_db}
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_me_in_production_min_32_chars}
      PORT: 3000
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:3000/api}
        VITE_UPLOADS_ORIGIN: ${VITE_UPLOADS_ORIGIN:-http://localhost:3000}
    container_name: pos-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8080}:80"
    depends_on:
      - api

volumes:
  postgres_data:
  backend_uploads:
