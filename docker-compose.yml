# POS local stack: PostgreSQL 17 + API only (frontend: npm run dev on host)
# Copy .env.example to .env and adjust secrets before first run.

name: pos-stack

services:
  db:
    image: postgres:17-alpine
    container_name: pos-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pos_change_me}
      POSTGRES_DB: ${POSTGRES_DB:-pos_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Dump must NOT use .sql suffix here (image auto-runs *.sql before scripts order may conflict)
      - ./DB.sql:/docker-entrypoint-initdb.d/seed/DB.sql:ro
      - ./docker/postgres/restore.sh:/docker-entrypoint-initdb.d/restore.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pos-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-3000}:3000"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-pos_change_me}
      DB_NAME: ${POSTGRES_DB:-pos_db}
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_me_in_production_min_32_chars}
      PORT: 3000
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  backend_uploads:
